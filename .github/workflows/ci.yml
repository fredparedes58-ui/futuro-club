name: CI — VITAS Football Intelligence

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Step 1: Lint & Type Check ──────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ── Step 2: Unit & Integration Tests ───────────────────────────────────────
  test-unit:
    name: Unit & API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npx vitest run --reporter=verbose

      - name: Run API tests
        run: npx vitest run --config vitest.api.config.ts --reporter=verbose

      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=json --outputFile=test-results.json --coverage.thresholds.statements=65 --coverage.thresholds.branches=55 --coverage.thresholds.functions=60 --coverage.thresholds.lines=65

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Step 3: Build ──────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test-unit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required env vars
        run: |
          missing=""
          [ -z "$VITE_SUPABASE_URL" ] && missing="$missing VITE_SUPABASE_URL"
          [ -z "$VITE_SUPABASE_ANON_KEY" ] && missing="$missing VITE_SUPABASE_ANON_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing required environment variables:$missing"
            exit 1
          fi
          echo "✅ All required env vars present"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Verify build output
        run: |
          echo "Build artifacts:"
          ls -lah dist/ || echo "No dist/ found"
          echo ""
          echo "PWA service worker:"
          ls -lah dist/sw.js dist/workbox-*.js 2>/dev/null || echo "No SW files"
          echo ""
          echo "Total bundle size:"
          du -sh dist/ 2>/dev/null || echo "N/A"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 3

  # ── Step 4: RAG Knowledge Base Seed (main branch only) ────────────────────
  rag-seed:
    name: RAG Seed
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Seed drills
        run: |
          curl -sf -X POST "https://futuro-club.vercel.app/api/rag/seed" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 120 || echo "Seed drills skipped (may already be seeded)"

      - name: Seed knowledge docs
        run: |
          curl -sf -X POST "https://futuro-club.vercel.app/api/rag/seed-knowledge" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 120 || echo "Seed knowledge skipped (may already be seeded)"

  # ── Step 5: E2E Tests (on PRs only) ───────────────────────────────────────
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
